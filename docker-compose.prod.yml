services:
  mysql:
    image: mysql:8.0
    container_name: keliu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: keliudb
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    expose:
      - "3306"
    networks:
      - keliu-net

  redis:
    image: redis:7-alpine
    container_name: keliu-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    expose:
      - "6379"
    networks:
      - keliu-net

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: keliu-es
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: always
    expose:
      - "9200"
    networks:
      - keliu-net

  backend:
    image: keliu-backend:prod
    container_name: keliu-backend
    env_file:
      - ./backend/.env
    environment:
      DB_URL: ${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      REDIS_URL: redis://redis:6379/0
      ES_URL: http://elasticsearch:9200
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    expose:
      - "8009"
    networks:
      - keliu-net

  celery-worker:
    image: keliu-backend:prod
    container_name: keliu-celery
    env_file:
      - ./backend/.env
    environment:
      DB_URL: ${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      REDIS_URL: redis://redis:6379/0
      ES_URL: http://elasticsearch:9200
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    restart: always
    networks:
      - keliu-net

  celery-beat:
    image: keliu-backend:prod
    container_name: keliu-celery-beat
    env_file:
      - ./backend/.env
    environment:
      DB_URL: ${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      REDIS_URL: redis://redis:6379/0
      ES_URL: http://elasticsearch:9200
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: always
    networks:
      - keliu-net

  nginx:
    image: keliu-frontend:prod
    container_name: keliu-nginx
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: always
    networks:
      - keliu-net

volumes:
  mysql_data:
  redis_data:
  es_data:

networks:
  keliu-net:
    driver: bridge
