services:
  # ============================================================
  # 数据库
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: keliu-mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: keliudb
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keliu-net

  # ============================================================
  # 缓存 / 消息队列
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: keliu-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - keliu-net

  # ============================================================
  # 全文搜索
  # ============================================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: keliu-es
    ports:
      - "${ES_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - keliu-net

  # ============================================================
  # 后端 API
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-backend
    ports:
      - "${BACKEND_PORT:-8009}:8009"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_URL=${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      - REDIS_URL=redis://redis:6379/0
      - ES_URL=http://elasticsearch:9200
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8009 --reload
    networks:
      - keliu-net

  # ============================================================
  # Celery 异步任务
  # ============================================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-celery
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_URL=${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      - REDIS_URL=redis://redis:6379/0
      - ES_URL=http://elasticsearch:9200
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app worker --loglevel=info
    networks:
      - keliu-net

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keliu-celery-beat
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DB_URL=${DOCKER_DB_URL:?Set DOCKER_DB_URL in .env}
      - REDIS_URL=redis://redis:6379/0
      - ES_URL=http://elasticsearch:9200
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app beat --loglevel=info
    networks:
      - keliu-net

  # ============================================================
  # 前端 & 反向代理
  #   docker compose --profile deploy up -d 时启动
  # ============================================================
  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: keliu-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - keliu-net
    profiles:
      - deploy

# ============================================================
# 数据卷
# ============================================================
volumes:
  mysql_data:
  redis_data:
  es_data:

# ============================================================
# 网络
# ============================================================
networks:
  keliu-net:
    driver: bridge
